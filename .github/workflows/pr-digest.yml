name: Daily PR Email

on:
  schedule:
     # GitHub cron uses UTC.
     # 5:00 AM EST (UTC-5) = 10:00 UTC
     # (During EDT this will run at 6:00 AM localtime.)
    - cron: "0 10 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Build digest markdown file
        env:
          REPOS: "uclibs/staff-directory-23 uclibs/ucrate uclibs/application_portfolio"
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y jq

          now="$(date -u '+%Y-%m-%d %H:%M UTC')"

          {
            echo "## PR Digest (${now})"
            echo
            echo "_Open PRs; excluding drafts; excluding titles starting with **WIP**._"
            echo
          } > digest.md

          for r in $REPOS; do
            prs_json=$(gh pr list -R "$r" --state open --json title,url,isDraft)

            filtered=$(echo "$prs_json" | jq '
              [ .[]
                | select(.isDraft == false)
                | select((.title | ascii_downcase | startswith("wip")) | not)
              ]')

            count=$(echo "$filtered" | jq 'length')

            {
              echo "### ${r}"
              if [ "$count" -eq 0 ]; then
                echo "- (no open PRs)"
              else
                echo "$filtered" | jq -r '.[] | "- [\(.title)](\(.url))"'
              fi
              echo
            } >> digest.md
          done

      - name: Create new digest issue and close previous ones
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          title="PR Digest - run $GITHUB_RUN_ID"

          # Create the new issue; capture the created issue URL
          new_url=$(gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "$title" \
            --body-file digest.md \
            --label "pr-digest")

          echo "Created: $new_url"

          # Extract issue number from the URL
          new_number="${new_url##*/}"

          # Close all other OPEN issues with label pr-digest
          gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --label "pr-digest" \
            --json number \
            --jq '.[].number' \
          | while read -r n; do
              if [ "$n" != "$new_number" ]; then
                echo "Closing old digest issue #$n"
                gh issue close "$n" --repo "$GITHUB_REPOSITORY"
              fi
            done