name: schedule-heartbeat

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  beat:
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create --repo "$GITHUB_REPOSITORY" --title "Heartbeat $GITHUB_RUN_ID" --body "scheduled test"